<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Keskin Words</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

<div class="container">
  <div id="statsPanel">
      <span>📊 Bugün Öğrenilen: <strong id="todayCount">0</strong></span>
      <span>🏆 Toplam Başarı: <strong id="totalKnownCount">0</strong></span>
  </div>

  <div id="levelScreen">
    <h1 class="main-title">Keskin Words</h1> 
    <div class="level-grid">
        <button onclick="selectLevel('A1')">A1 - Başlangıç</button>
        <button onclick="selectLevel('A2')">A2 - Temel</button>
        <button onclick="selectLevel('B1')">B1 - Orta</button>
        <button onclick="selectLevel('B2')">B2 - Üst Orta</button>
        <button onclick="selectLevel('C1')" style="grid-column: span 2;">C1 - İleri</button>
    </div>
    <button id="missedWordsBtn" onclick="studyMissedWords()">⚠️ Zorlandığım Kelimeler</button>
  </div>

  <div id="appScreen" style="display:none;">
    <div class="top-nav">
        <button onclick="goToMainMenu()" class="back-btn">← Menüye Dön</button>
    </div>

    <div class="progress-container">
        <div class="progress-bar-bg">
            <div id="progressBar"></div>
        </div>
        <small id="progressText">0 / 0</small>
    </div>

    <div id="wordDisplay">
        <div class="word-wrap">
            <h2 id="word"></h2>
            <button onclick="speakWord()" class="speaker-btn">🔊</button>
        </div>
    </div>

    <div class="buttons" id="mainButtons">
      <button class="btn-know" onclick="answer(true)">Biliyorum ✅</button>
      <button class="btn-dont-know" onclick="answer(false)">Bilmiyorum ❌</button>
    </div>

    <div id="infoBox" style="display:none;">
      <h3 id="meaning"></h3>
      <p class="ex-label">Örnek Cümleler:</p>
      <ul id="examples"></ul>
      <button class="btn-next" onclick="nextWord()">Sıradaki Kelime →</button>
    </div>
  </div>

  <div id="congratsScreen" style="display:none;">
      <div class="congrats-icon">🏆</div>
      <h1>Mükemmel!</h1>
      <p id="congratsMessage"></p>
      <button onclick="goToMainMenu()" class="btn-next">Ana Menüye Dön</button>
  </div>
</div>

<script src="app.js"></script>
</body>
</html>
